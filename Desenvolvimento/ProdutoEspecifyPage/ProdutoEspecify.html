<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Produto - Abacate</title>
  <link rel="stylesheet" href="ProdutoEspecify.css">
  <link rel="stylesheet" type="text/css" href="//fonts.googleapis.com/css?family=Nova+Square" />
</head>

<body>
  <div id="header-container"></div>

  <div class="container">
    <header>
      <button class="btn-back" onclick="history.back()">← Voltar</button>
      <h1>Detalhes do Produto</h1>
    </header>

    <main class="product-card" id="product-container">
      <div class="product-image">
        <img alt="Imagem do Produto" id="img-render">
      </div>

      <div class="product-info">
        <div class="badge" id="category-badge">Categoria</div>
        <h2 id="product-name">Carregando...</h2>
        <p class="description" id="product-desc"></p>

        <div class="specs">
          <div class="spec-item">
            <span>Tamanho</span>
            <strong id="product-dim">-</strong>
          </div>
          <div class="spec-item">
            <span>Gênero</span>
            <strong id="product-gender">-</strong>
          </div>
        </div>

        <div class="meta-info">
          <p>Vendido por: <span id="user-email">...</span></p>
          <small>Adicionado em: <span id="created-at">...</span></small>
        </div>

        <div class="contato">
          <h1>ENTRE EM CONTATO:</h1>
          <h1>contato@auma.com</h1>
        </div>
      </div>
    </main>
  </div>

  <div id="footer-container"></div>

  <script src="../Header/header.js"></script>
  <script src="../Footer/footer.js"></script>
  <script src="ProdutoEspecify.js"></script>
</body>

</html>
